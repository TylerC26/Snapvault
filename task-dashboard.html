<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>App Task Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3350;
      --text: #e4e7f1;
      --muted: #7880a0;
      --frontend: #4f8ef7;
      --backend: #a78bfa;
      --marketing: #34d399;
      --financial: #fb923c;
      --high: #f87171;
      --medium: #fbbf24;
      --low: #6ee7b7;
      --done-bg: #161a23;
      --radius: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header h1 span {
      color: var(--frontend);
    }

    .stats {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .stat-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .stat-chip strong {
      color: var(--text);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
      align-items: start;
    }

    @media (max-width: 1100px) { .board { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 600px)  { .board { grid-template-columns: 1fr; } }

    .column {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .col-header {
      padding: 14px 16px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .col-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 0.95rem;
    }

    .col-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .col-count {
      background: var(--surface2);
      border-radius: 12px;
      padding: 2px 9px;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .task-list {
      padding: 10px 10px 6px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 60px;
    }

    .task-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 12px;
      cursor: default;
      transition: border-color 0.15s, opacity 0.2s;
      position: relative;
    }

    .task-card:hover {
      border-color: var(--muted);
    }

    .task-card.done {
      opacity: 0.45;
      background: var(--done-bg);
    }

    .task-card.done .task-title {
      text-decoration: line-through;
      color: var(--muted);
    }

    .task-top {
      display: flex;
      align-items: flex-start;
      gap: 9px;
    }

    .task-check {
      margin-top: 1px;
      flex-shrink: 0;
      width: 16px;
      height: 16px;
      border-radius: 4px;
      border: 2px solid var(--border);
      cursor: pointer;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }

    .task-check.checked {
      background: var(--muted);
      border-color: var(--muted);
    }

    .task-check.checked::after {
      content: "✓";
      font-size: 10px;
      color: #fff;
      line-height: 1;
    }

    .task-title {
      font-size: 0.88rem;
      font-weight: 500;
      line-height: 1.4;
      flex: 1;
    }

    .task-actions {
      display: none;
      gap: 4px;
      margin-left: auto;
    }

    .task-card:hover .task-actions {
      display: flex;
    }

    .task-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 0.8rem;
      padding: 2px 5px;
      border-radius: 4px;
      transition: color 0.1s, background 0.1s;
    }

    .task-btn:hover {
      color: var(--text);
      background: var(--border);
    }

    .task-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 7px;
      margin-left: 25px;
      flex-wrap: wrap;
    }

    .priority-tag {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 10px;
      letter-spacing: 0.3px;
    }

    .priority-high   { background: rgba(248,113,113,0.15); color: var(--high); }
    .priority-medium { background: rgba(251,191,36,0.15);  color: var(--medium); }
    .priority-low    { background: rgba(110,231,183,0.15); color: var(--low); }

    .task-date {
      font-size: 0.7rem;
      color: var(--muted);
    }

    .task-date.overdue {
      color: var(--high);
    }

    .add-task-btn {
      width: calc(100% - 20px);
      margin: 4px 10px 10px;
      background: transparent;
      border: 1px dashed var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-size: 0.82rem;
      padding: 8px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .add-task-btn:hover {
      border-color: var(--muted);
      color: var(--text);
    }

    /* Progress bar */
    .col-progress {
      height: 3px;
      background: var(--border);
      margin: 0 16px 12px;
      border-radius: 2px;
      overflow: hidden;
    }

    .col-progress-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      width: 100%;
      max-width: 420px;
      margin: 16px;
    }

    .modal h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 18px;
    }

    .form-group {
      margin-bottom: 14px;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      color: var(--text);
      font-size: 0.88rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      border-color: var(--frontend);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 70px;
    }

    .form-group select option {
      background: var(--surface2);
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 20px;
    }

    .btn {
      padding: 8px 18px;
      border-radius: 7px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s;
    }

    .btn:hover { opacity: 0.85; }

    .btn-primary {
      background: var(--frontend);
      color: #fff;
    }

    .btn-ghost {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
      padding: 16px 0 8px;
    }

    .filter-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 0.8rem;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover, .filter-btn.active {
      color: var(--text);
      border-color: var(--muted);
      background: var(--surface2);
    }

    .filter-btn.active {
      border-color: var(--frontend);
      color: var(--frontend);
    }

    .search-input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 0.8rem;
      color: var(--text);
      outline: none;
      width: 180px;
      font-family: inherit;
      transition: border-color 0.15s;
    }

    .search-input:focus {
      border-color: var(--muted);
    }

    .search-input::placeholder {
      color: var(--muted);
    }
  </style>
</head>
<body>

<header>
  <h1>📋 App <span>Task Dashboard</span></h1>
  <div class="stats">
    <div class="stat-chip">Total: <strong id="stat-total">0</strong></div>
    <div class="stat-chip">In Progress: <strong id="stat-open">0</strong></div>
    <div class="stat-chip">Completed: <strong id="stat-done">0</strong></div>
  </div>
</header>

<div class="filter-bar">
  <input class="search-input" id="search" placeholder="🔍  Search tasks…" oninput="renderAll()" />
  <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">All</button>
  <button class="filter-btn" data-filter="high" onclick="setFilter('high', this)">🔴 High</button>
  <button class="filter-btn" data-filter="medium" onclick="setFilter('medium', this)">🟡 Medium</button>
  <button class="filter-btn" data-filter="low" onclick="setFilter('low', this)">🟢 Low</button>
  <button class="filter-btn" data-filter="done" onclick="setFilter('done', this)">✅ Done</button>
</div>

<div class="board" id="board"></div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="modal" onclick="closeModalOutside(event)">
  <div class="modal">
    <h2 id="modal-title">Add Task</h2>
    <div class="form-group">
      <label>Task Title *</label>
      <input type="text" id="f-title" placeholder="What needs to be done?" />
    </div>
    <div class="form-group">
      <label>Notes</label>
      <textarea id="f-notes" placeholder="Optional details…"></textarea>
    </div>
    <div class="form-group">
      <label>Category</label>
      <select id="f-category">
        <option value="frontend">Front End</option>
        <option value="backend">Back End</option>
        <option value="marketing">Marketing</option>
        <option value="financial">Financial</option>
      </select>
    </div>
    <div class="form-group">
      <label>Priority</label>
      <select id="f-priority">
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
      </select>
    </div>
    <div class="form-group">
      <label>Due Date</label>
      <input type="date" id="f-date" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveTask()">Save Task</button>
    </div>
  </div>
</div>

<script>
const CATEGORIES = [
  { id: 'frontend',  label: 'Front End',  color: '#4f8ef7' },
  { id: 'backend',   label: 'Back End',   color: '#a78bfa' },
  { id: 'marketing', label: 'Marketing',  color: '#34d399' },
  { id: 'financial', label: 'Financial',  color: '#fb923c' },
];

const STORAGE_KEY = 'app_task_dashboard_v1';

let tasks = [];
let activeFilter = 'all';
let editingId = null;
let defaultCategory = null;

function loadTasks() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) tasks = JSON.parse(saved);
  } catch(e) {}
  if (!tasks.length) tasks = getDefaultTasks();
}

function saveTasks() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); } catch(e) {}
}

function getDefaultTasks() {
  return [
    { id: uid(), category: 'frontend', title: 'Design landing page UI', priority: 'high', done: false, date: '', notes: '' },
    { id: uid(), category: 'frontend', title: 'Implement responsive navigation', priority: 'medium', done: false, date: '', notes: '' },
    { id: uid(), category: 'frontend', title: 'Set up component library', priority: 'low', done: false, date: '', notes: '' },
    { id: uid(), category: 'backend', title: 'Set up API authentication', priority: 'high', done: false, date: '', notes: '' },
    { id: uid(), category: 'backend', title: 'Design database schema', priority: 'high', done: false, date: '', notes: '' },
    { id: uid(), category: 'backend', title: 'Write unit tests', priority: 'medium', done: false, date: '', notes: '' },
    { id: uid(), category: 'marketing', title: 'Write app store description', priority: 'medium', done: false, date: '', notes: '' },
    { id: uid(), category: 'marketing', title: 'Create social media assets', priority: 'low', done: false, date: '', notes: '' },
    { id: uid(), category: 'marketing', title: 'Plan launch campaign', priority: 'high', done: false, date: '', notes: '' },
    { id: uid(), category: 'financial', title: 'Define pricing tiers', priority: 'high', done: false, date: '', notes: '' },
    { id: uid(), category: 'financial', title: 'Set up Stripe integration', priority: 'high', done: false, date: '', notes: '' },
    { id: uid(), category: 'financial', title: 'Review operating costs', priority: 'medium', done: false, date: '', notes: '' },
  ];
}

function uid() {
  return Math.random().toString(36).slice(2) + Date.now().toString(36);
}

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderAll();
}

function matchesFilter(task) {
  const q = document.getElementById('search').value.toLowerCase();
  if (q && !task.title.toLowerCase().includes(q) && !task.notes.toLowerCase().includes(q)) return false;
  if (activeFilter === 'done') return task.done;
  if (activeFilter === 'high')   return !task.done && task.priority === 'high';
  if (activeFilter === 'medium') return !task.done && task.priority === 'medium';
  if (activeFilter === 'low')    return !task.done && task.priority === 'low';
  return true; // 'all'
}

function isOverdue(dateStr) {
  if (!dateStr) return false;
  return new Date(dateStr) < new Date(new Date().toDateString());
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function renderAll() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  let totalOpen = 0, totalDone = 0;

  CATEGORIES.forEach(cat => {
    const catTasks = tasks.filter(t => t.category === cat.id);
    const visible = catTasks.filter(matchesFilter);
    const doneCount = catTasks.filter(t => t.done).length;
    const pct = catTasks.length ? Math.round((doneCount / catTasks.length) * 100) : 0;

    totalOpen += catTasks.filter(t => !t.done).length;
    totalDone += doneCount;

    const col = document.createElement('div');
    col.className = 'column';

    col.innerHTML = `
      <div class="col-header">
        <div class="col-title">
          <div class="col-dot" style="background:${cat.color}"></div>
          ${cat.label}
        </div>
        <span class="col-count">${doneCount}/${catTasks.length}</span>
      </div>
      <div class="col-progress">
        <div class="col-progress-fill" style="width:${pct}%;background:${cat.color}"></div>
      </div>
      <div class="task-list" id="list-${cat.id}"></div>
      <button class="add-task-btn" onclick="openModal('${cat.id}')">＋ Add task</button>
    `;

    board.appendChild(col);

    const list = col.querySelector(`#list-${cat.id}`);

    if (visible.length === 0) {
      list.innerHTML = '<div class="empty-state">No tasks here</div>';
    } else {
      visible.forEach(task => {
        const card = document.createElement('div');
        card.className = 'task-card' + (task.done ? ' done' : '');
        const overdue = !task.done && isOverdue(task.date);
        card.innerHTML = `
          <div class="task-top">
            <div class="task-check ${task.done ? 'checked' : ''}" onclick="toggleDone('${task.id}')"></div>
            <span class="task-title">${escHtml(task.title)}</span>
            <div class="task-actions">
              <button class="task-btn" onclick="openEdit('${task.id}')" title="Edit">✎</button>
              <button class="task-btn" onclick="deleteTask('${task.id}')" title="Delete">✕</button>
            </div>
          </div>
          <div class="task-meta">
            <span class="priority-tag priority-${task.priority}">${task.priority}</span>
            ${task.date ? `<span class="task-date ${overdue ? 'overdue' : ''}">${overdue ? '⚠ ' : ''}${formatDate(task.date)}</span>` : ''}
          </div>
          ${task.notes ? `<div style="font-size:0.75rem;color:var(--muted);margin-top:6px;margin-left:25px;line-height:1.4">${escHtml(task.notes)}</div>` : ''}
        `;
        list.appendChild(card);
      });
    }
  });

  const total = totalOpen + totalDone;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-open').textContent = totalOpen;
  document.getElementById('stat-done').textContent = totalDone;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toggleDone(id) {
  const t = tasks.find(t => t.id === id);
  if (t) { t.done = !t.done; saveTasks(); renderAll(); }
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  saveTasks();
  renderAll();
}

function openModal(catId) {
  editingId = null;
  defaultCategory = catId;
  document.getElementById('modal-title').textContent = 'Add Task';
  document.getElementById('f-title').value = '';
  document.getElementById('f-notes').value = '';
  document.getElementById('f-category').value = catId || 'frontend';
  document.getElementById('f-priority').value = 'medium';
  document.getElementById('f-date').value = '';
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('f-title').focus(), 50);
}

function openEdit(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  editingId = id;
  document.getElementById('modal-title').textContent = 'Edit Task';
  document.getElementById('f-title').value = t.title;
  document.getElementById('f-notes').value = t.notes;
  document.getElementById('f-category').value = t.category;
  document.getElementById('f-priority').value = t.priority;
  document.getElementById('f-date').value = t.date;
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('f-title').focus(), 50);
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  editingId = null;
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

function saveTask() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { document.getElementById('f-title').focus(); return; }
  const data = {
    title,
    notes: document.getElementById('f-notes').value.trim(),
    category: document.getElementById('f-category').value,
    priority: document.getElementById('f-priority').value,
    date: document.getElementById('f-date').value,
  };
  if (editingId) {
    const t = tasks.find(t => t.id === editingId);
    if (t) Object.assign(t, data);
  } else {
    tasks.push({ id: uid(), done: false, ...data });
  }
  saveTasks();
  closeModal();
  renderAll();
}

// Keyboard: Escape closes modal, Enter saves
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && document.getElementById('modal').classList.contains('open')) {
    if (document.activeElement.tagName !== 'TEXTAREA') saveTask();
  }
});

loadTasks();
renderAll();
</script>
</body>
</html>
